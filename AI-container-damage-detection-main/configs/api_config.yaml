# API Configuration for GPT-5 Enhanced Container Inspection
api:
  host: "127.0.0.1"
  port: 8000
  title: "Container Inspection API (GPT-5 Enhanced)"
  version: "2.0.0"

# OpenAI Configuration
openai:
  api_key: ""  # Set your OpenAI API key here
  gpt5_model: "gpt-5"
  gpt5_vision_model: "gpt-5-vision"
  temperature: 0.0
  max_tokens: 4000

# Model Configuration
models:
  master_detector: "models/yolov8_master_detector.pt"
  damage_detector: "models/yolov8_damage_detector.pt"
  detection_confidence_threshold: 0.4
  high_confidence_threshold: 0.90

# Output Configuration
output:
  directory: "data/outputs"
  log_level: "INFO"
  save_annotated_images: true
  save_raw_analysis: true

# Streamlit Configuration
streamlit:
  host: "127.0.0.1"
  port: 8501
  title: "Container Inspection System (GPT-5)"
